<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Primavera Flowers">
  <title>Primavera Flowers</title>
  <!-- Sage green background -->
  <rect width="400" height="400" fill="#A4B498"/>

  <!-- Decorative leaves to the left of the P -->
  <g fill="#ffffff" opacity="0.96">
    <!-- Stem -->
    <path d="M 122,295 Q 125,250 138,210 Q 145,180 160,160" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Leaf 1 (lower left) -->
    <path d="M 102,278 Q 92,266 96,250 Q 110,246 122,260 Q 116,275 102,278 Z"/>
    <!-- Leaf 2 (mid left) -->
    <path d="M 92,250 Q 80,232 90,218 Q 108,218 118,236 Q 110,250 92,250 Z"/>
    <!-- Leaf 3 (upper, sweeping right) -->
    <path d="M 130,218 Q 152,210 168,222 Q 158,238 138,236 Q 130,228 130,218 Z"/>
    <!-- Leaf 4 (top small) -->
    <path d="M 142,196 Q 158,188 170,196 Q 162,210 148,206 Q 142,202 142,196 Z"/>
    <!-- Tendril curl (bottom) -->
    <path d="M 110,300 Q 100,310 105,322 Q 115,326 120,316" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- The P letterform — calligraphic serif, white on sage -->
  <g fill="#ffffff">
    <!-- Vertical stem -->
    <rect x="178" y="148" width="22" height="170" rx="1"/>
    <!-- Bottom serif -->
    <path d="M 158,318 L 220,318 L 218,328 Q 198,326 178,328 L 158,328 Z"/>
    <!-- Top of P (descending flourish stroke - stylized) -->
    <path d="M 178,148 L 178,135 Q 200,128 230,138 Q 264,150 278,176 Q 286,196 274,214 Q 258,236 222,238 L 200,238 L 200,224 L 220,224 Q 246,222 256,206 Q 264,190 256,176 Q 246,160 224,156 Q 204,154 178,158 Z"/>
    <!-- Calligraphic flourish above -->
    <path d="M 226,138 Q 280,118 320,138 Q 330,144 322,152 Q 280,138 232,150 Z" opacity="0.9"/>
    <!-- Inner counter detail -->
    <path d="M 200,168 Q 218,168 226,180 Q 230,192 222,202 Q 212,210 200,210 Z" fill="#A4B498"/>
  </g>
</svg>
